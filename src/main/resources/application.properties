# Service name
spring.application.name=karapada-school

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Profile
spring.profiles.active=local

# Logging levels
logging.level.root=INFO
logging.level.com.karapada=DEBUG
# logging.file.name=C:\app\Karapada-School\logs\karapadaschool.log   <-- COMMENTED

# Actuator
management.endpoints.web.exposure.include=health,info,metrics,loggers

# Tracing
management.tracing.enabled=true
management.tracing.sampling.probability=1.0
management.observations.http.server.requests.enabled=true
